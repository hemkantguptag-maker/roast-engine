<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#09090b"/>
  <defs>
    <radialGradient id="g1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Main title -->
  <text x="600" y="255" text-anchor="middle" font-size="88" font-weight="800"
        fill="#fafafa" font-family="system-ui, -apple-system, sans-serif"
        letter-spacing="-2">=% Roast Engine</text>

  <!-- Orange subtitle -->
  <text x="600" y="330" text-anchor="middle" font-size="34" font-weight="600"
        fill="#f97316" font-family="system-ui, -apple-system, sans-serif">
    Brutal AI Profile &amp; Outfit Roaster
  </text>

  <!-- Divider line -->
  <line x1="440" y1="365" x2="760" y2="365" stroke="#27272a" stroke-width="1"/>

  <!-- Sub-text -->
  <text x="600" y="410" text-anchor="middle" font-size="24"
        fill="#71717a" font-family="system-ui, -apple-system, sans-serif">
    LinkedIn Roast · Resume Roast · Outfit Roast
  </text>

  <!-- Social proof -->
  <text x="600" y="460" text-anchor="middle" font-size="22"
        fill="#a3a3a3" font-family="system-ui, -apple-system, sans-serif">
    PPPPP  4.9/5  ·  12,000+ professionals roasted
  </text>

  <!-- URL badge -->
  <rect x="480" y="505" width="240" height="44" rx="22" fill="#18181b"/>
  <text x="600" y="532" text-anchor="middle" font-size="20" font-weight="500"
        fill="#71717a" font-family="system-ui, -apple-system, sans-serif">
    myroastengine.com
  </text>
</svg>
